<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>NetVision v2.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <span class="net">NET</span><span class="vision">VISION</span>
            </div>
            <button id="scan-btn" onclick="startScan()">RUN DEEP SCAN</button>
        </header>

        <div class="main-layout">
            <aside class="console-box">
                <div class="box-label">SYSTEM_LOG</div>
                <div id="console-out" class="console-content">
                    > System ready...<br>
                    > Waiting for scan command...
                </div>
            </aside>

            <main class="results-box">
                <div class="box-label">DETECTED_NODES [<span id="total-count">0</span>]</div>
                <div id="device-grid" class="device-grid"></div>
            </main>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
